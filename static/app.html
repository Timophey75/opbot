<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Management App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
            min-height: 400px;
            display: none;
        }

        .content.active {
            display: block;
        }

        /* Экран логина */
        .login-screen {
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            box-shadow: none;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 14px;
            margin: 5px;
        }

        .error {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
        }

        .success {
            color: #27ae60;
            font-size: 14px;
            margin-top: 10px;
        }

        /* Главное меню */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .menu-button {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            padding: 30px 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .menu-button.calendar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .menu-button.operators {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .menu-button.reminders {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        .menu-button.profile {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #333;
        }

        .menu-button:hover {
            transform: translateY(-5px);
        }

        .emoji {
            font-size: 32px;
        }

        /* Календарь */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav {
            display: flex;
            gap: 10px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 20px;
        }

        .weekday-header {
            text-align: center;
            font-weight: 600;
            color: #667eea;
            padding: 8px;
            font-size: 12px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            padding: 4px;
            position: relative;
            background: white;
            overflow: hidden;
            min-width: 0;
        }

        .day-cell:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .day-cell.empty {
            opacity: 0.3;
            cursor: default;
        }

        .day-cell.today {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .day-number {
            font-weight: 600;
            font-size: 14px;
        }

        .operators-icons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 2px;
            margin-top: 2px;
            font-size: 12px;
            max-width: 100%;
            overflow: hidden;
        }

        .day-cell {
            min-width: 0;
        }

        /* День детально */
        .day-details {
            margin-bottom: 20px;
        }

        .day-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .period-section {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .period-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .event {
            background: white;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
        }

        .event-title {
            font-weight: 600;
            color: #333;
        }

        .event-time {
            font-size: 12px;
            color: #999;
        }

        .event-operator {
            font-size: 12px;
            color: #667eea;
            margin-top: 5px;
        }

        /* Модальные окна */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 25px;
            max-width: 450px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #333;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .modal-buttons .btn {
            flex: 1;
        }

        /* Список операторов */
        .operator-item {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .operator-info {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .operator-color {
            font-size: 24px;
        }

        .operator-name {
            font-weight: 600;
            color: #333;
        }

        .operator-code {
            font-size: 12px;
            color: #999;
        }

        .operator-actions {
            display: flex;
            gap: 5px;
        }

        .icon-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 5px;
            transition: transform 0.2s;
        }

        .icon-btn:hover {
            transform: scale(1.2);
        }

        /* Переходы */
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .text-center {
            text-align: center;
        }

        .mt10 {
            margin-top: 10px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #999;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ddd;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .user-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-data h3 {
            margin-bottom: 5px;
        }

        .user-data p {
            font-size: 12px;
            opacity: 0.9;
        }

        .admin-badge {
            background: #ffc107;
            color: #333;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📅 Расписание</h1>
            <p>Система управления смен</p>
        </div>

        <!-- Экран логина -->
        <div id="loginScreen" class="content active">
            <div class="login-screen">
                <h2 style="margin-bottom: 20px;">Введите ваш код</h2>
                <div class="input-group">
                    <label for="codeInput">Код доступа (4 цифры)</label>
                    <input type="text" id="codeInput" maxlength="4" placeholder="0000" inputmode="numeric">
                </div>
                <button class="btn" onclick="app.login()">Войти</button>
                <div id="loginError" class="error"></div>
            </div>
        </div>

        <!-- Главное меню -->
        <div id="menuScreen" class="content">
            <div id="userInfo" class="user-info" style="display:none;">
                <div class="user-data">
                    <h3 id="userName"></h3>
                    <p id="userRole"></p>
                </div>
                <div id="userBadge"></div>
            </div>

            <div class="menu-grid">
                <button class="menu-button calendar" onclick="app.openCalendar()">
                    <span class="emoji">📅</span>
                    <span>Календарь</span>
                </button>
                <button class="menu-button reminders" onclick="app.openReminders()">
                    <span class="emoji">🔔</span>
                    <span>Напоминания</span>
                </button>
                <button class="menu-button operators" id="operatorsBtn" onclick="app.openOperators()" style="display:none;">
                    <span class="emoji">👥</span>
                    <span>Операторы</span>
                </button>
                <button class="menu-button profile" onclick="app.logout()">
                    <span class="emoji">🚪</span>
                    <span>Выход</span>
                </button>
            </div>
        </div>

        <!-- Календарь -->
        <div id="calendarScreen" class="content">
            <div class="calendar-header">
                <div>
                    <h2 id="monthYear" style="font-size: 20px;"></h2>
                </div>
                <div class="calendar-nav">
                    <button class="btn btn-small" onclick="app.prevMonth()">⬅️ Назад</button>
                    <button class="btn btn-small" onclick="app.todayMonth()">📍 Сегодня</button>
                    <button class="btn btn-small" onclick="app.nextMonth()">Вперед ➡️</button>
                </div>
            </div>

            <div class="calendar-grid" id="calendarGrid"></div>
            <button class="btn btn-secondary" onclick="app.backToMenu()">↩️ Назад в меню</button>
        </div>

        <!-- День (детально) -->
        <div id="dayScreen" class="content">
            <button class="btn btn-secondary" onclick="app.backToCalendar()" style="margin-bottom: 15px;">⬅️ Назад в календарь</button>
            <div id="dayContent"></div>
        </div>

        <!-- Напоминания -->
        <div id="remindersScreen" class="content">
            <h2 style="margin-bottom: 15px;">⏰ Мои напоминания</h2>
            <div id="remindersContent"></div>
            <button class="btn btn-secondary" onclick="app.backToMenu()" style="margin-top: 15px;">↩️ Назад в меню</button>
        </div>

        <!-- Управление операторами -->
        <div id="operatorsScreen" class="content">
            <h2 style="margin-bottom: 15px;">👥 Управление операторами</h2>
            <div id="operatorsList"></div>
            <button class="btn" onclick="app.createOperatorModal()" style="margin-top: 15px;">➕ Добавить оператора</button>
            <button class="btn btn-secondary" onclick="app.backToMenu()" style="margin-top: 10px;">↩️ Назад в меню</button>
        </div>
    </div>

    <!-- Модальные окна -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
